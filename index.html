<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mdnote Premium • Offline</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #121212;
      --panel: #1f1f21;
      --panel-soft: #242426;
      --cream: #f3ead8;
      --muted: #8b8b8d;
      --text: #e2dfd7;
      --accent: #ff845f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% -10%, rgba(255, 255, 255, 0.055), transparent 32rem),
        var(--bg);
      color: var(--text);
      font-family: Georgia, "Times New Roman", Times, serif;
    }

    .app-shell {
      min-height: 100vh;
      padding: clamp(1.25rem, 4vw, 2.5rem) clamp(0.8rem, 3vw, 1.35rem);
    }

    .status-pill {
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(36, 36, 38, 0.9);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.24);
      color: #d2bda5;
      letter-spacing: 0.03em;
    }

    .hello-title {
      color: var(--cream);
      font-size: clamp(2.7rem, 7.2vw, 4.9rem);
      line-height: 0.95;
      letter-spacing: -0.06em;
      text-shadow: 0 12px 44px rgba(0, 0, 0, 0.25);
    }

    .hello-star {
      color: var(--accent);
      display: inline-block;
      margin-right: 0.45rem;
      transform: translateY(-0.12em) rotate(-9deg);
    }

    .note-panel {
      background: var(--panel);
      border-radius: 1.05rem;
      box-shadow: 0 28px 70px rgba(0, 0, 0, 0.26);
      min-height: min(62vh, 34rem);
    }

    textarea {
      width: 100%;
      min-height: min(49vh, 27rem);
      resize: vertical;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      caret-color: var(--cream);
      font-family: inherit;
      font-size: clamp(1.12rem, 2.6vw, 1.35rem);
      line-height: 1.68;
    }

    textarea::placeholder { color: rgba(224, 224, 224, 0.36); }

    .tool-btn, .font-select {
      min-width: 2.18rem;
      height: 2.18rem;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: var(--panel-soft);
      color: #ded8cc;
      border-radius: 0.62rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease, color 160ms ease;
      user-select: none;
    }

    .tool-btn:hover, .font-select:hover {
      transform: translateY(-1px);
      border-color: rgba(255, 255, 255, 0.25);
      background: #2b2b2e;
      color: #fff7e8;
    }

    .danger-btn { border-color: rgba(255, 132, 95, 0.58); color: #ffc0ab; }
    .danger-btn:hover { background: rgba(255, 132, 95, 0.12); }

    .font-select {
      width: 5rem;
      padding: 0 0.45rem;
      font-family: Georgia, "Times New Roman", Times, serif;
      outline: 0;
    }

    .saved-toast {
      opacity: 0;
      transform: translateY(0.45rem);
      transition: opacity 220ms ease, transform 220ms ease;
      color: #b8d8bb;
      pointer-events: none;
    }

    .saved-toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 640px) {
      .note-panel { min-height: 66vh; }
      textarea { min-height: 52vh; }
      .toolbar { gap: 0.42rem; }
      .tool-btn, .font-select { min-width: 2.05rem; height: 2.05rem; }
      .font-select { width: 4.65rem; }
    }
  </style>
</head>
<body>
  <main class="app-shell flex flex-col items-center">
    <div class="status-pill rounded-xl px-4 py-2 text-sm">Mdnote Premium · Offline</div>

    <header class="w-full max-w-5xl mt-6 mb-5 text-center">
      <h1 class="hello-title font-normal"><span class="hello-star">*</span>Hi, <span id="studentName">Guest</span></h1>
    </header>

    <section class="note-panel w-full max-w-6xl p-3 sm:p-4 flex flex-col" aria-label="Öğrenci not defteri">
      <textarea id="noteArea" spellcheck="true" placeholder="What do you want to capture right now?" aria-label="Not yazma alanı"></textarea>

      <div class="mt-auto flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
        <nav class="toolbar flex flex-wrap items-center gap-2" aria-label="Not araç çubuğu">
          <button class="tool-btn" type="button" title="Dekoratif">+</button>
          <button class="tool-btn" type="button" id="headingBtn" title="Başlık ekle">H</button>
          <button class="tool-btn" type="button" id="listBtn" title="Liste maddesi ekle">•</button>
          <button class="tool-btn" type="button" id="codeBtn" title="Kod bloğu ekle">{</button>
          <button class="tool-btn" type="button" id="quoteBtn" title="Alıntı ekle">T</button>
          <button class="tool-btn" type="button" id="tagBtn" title="Etiket ekle">#</button>
          <button class="tool-btn" type="button" id="splitBtn" title="Ayraç ekle">▣</button>
          <button class="tool-btn" type="button" id="focusBtn" title="Odak işareti ekle">◐</button>
          <button class="tool-btn" type="button" id="downloadBtn" title="TXT indir">↓</button>
          <button class="tool-btn danger-btn" type="button" id="clearBtn" title="Notu temizle">×</button>
          <select id="fontSelect" class="font-select" title="Serif font seç">
            <option value="Georgia, 'Times New Roman', Times, serif">Serif</option>
            <option value="'Playfair Display', Georgia, serif">Display</option>
            <option value="'Merriweather', Georgia, serif">Book</option>
          </select>
        </nav>
        <div id="savedToast" class="saved-toast text-sm px-2">Saved</div>
      </div>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const rawUser = (params.get('user') || 'Guest').trim() || 'Guest';
    const storageKey = `note_${rawUser}`;
    const fontKey = `font_${rawUser}`;

    const studentName = document.getElementById('studentName');
    const noteArea = document.getElementById('noteArea');
    const savedToast = document.getElementById('savedToast');
    const fontSelect = document.getElementById('fontSelect');

    studentName.textContent = rawUser;
    noteArea.value = localStorage.getItem(storageKey) || '';

    const savedFont = localStorage.getItem(fontKey);
    if (savedFont) {
      noteArea.style.fontFamily = savedFont;
      fontSelect.value = savedFont;
    }

    function debounce(fn, delay = 1500) {
      let timer;
      return (...args) => {
        clearTimeout(timer);
        timer = setTimeout(() => fn.apply(null, args), delay);
      };
    }

    function showSavedToast(message = 'Saved') {
      savedToast.textContent = message;
      savedToast.classList.add('show');
      setTimeout(() => savedToast.classList.remove('show'), 1300);
    }

    const saveNote = debounce(() => {
      localStorage.setItem(storageKey, noteArea.value);
      showSavedToast('Saved');
    }, 1500);

    noteArea.addEventListener('input', saveNote);

    function wrapSelection(prefix, suffix = '') {
      const start = noteArea.selectionStart;
      const end = noteArea.selectionEnd;
      const selected = noteArea.value.slice(start, end);
      const replacement = `${prefix}${selected || ''}${suffix}`;
      noteArea.setRangeText(replacement, start, end, 'end');
      noteArea.focus();
      noteArea.dispatchEvent(new Event('input'));
    }

    function formatCurrentLine(prefix) {
      const cursor = noteArea.selectionStart;
      const lineStart = noteArea.value.lastIndexOf('\n', cursor - 1) + 1;
      noteArea.setRangeText(prefix, lineStart, lineStart, 'end');
      noteArea.focus();
      noteArea.dispatchEvent(new Event('input'));
    }

    document.getElementById('headingBtn').addEventListener('click', () => formatCurrentLine('## '));
    document.getElementById('listBtn').addEventListener('click', () => formatCurrentLine('• '));
    document.getElementById('codeBtn').addEventListener('click', () => wrapSelection('`', '`'));
    document.getElementById('quoteBtn').addEventListener('click', () => formatCurrentLine('> '));
    document.getElementById('tagBtn').addEventListener('click', () => wrapSelection('#'));
    document.getElementById('splitBtn').addEventListener('click', () => wrapSelection('\n---\n'));
    document.getElementById('focusBtn').addEventListener('click', () => wrapSelection('◐ '));

    fontSelect.addEventListener('change', () => {
      noteArea.style.fontFamily = fontSelect.value;
      localStorage.setItem(fontKey, fontSelect.value);
      showSavedToast('Font saved');
    });

    document.getElementById('downloadBtn').addEventListener('click', () => {
      const blob = new Blob([noteArea.value], { type: 'text/plain;charset=utf-8' });
      const link = document.createElement('a');
      const safeName = rawUser.replace(/[^a-z0-9_-]+/gi, '-').replace(/^-+|-+$/g, '') || 'Guest';
      link.href = URL.createObjectURL(blob);
      link.download = `${safeName}-notes.txt`;
      link.click();
      URL.revokeObjectURL(link.href);
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      if (confirm('Notu silmek istediğinize emin misiniz?')) {
        noteArea.value = '';
        localStorage.removeItem(storageKey);
        showSavedToast('Cleared');
        noteArea.focus();
      }
    });
  </script>
</body>
</html>
